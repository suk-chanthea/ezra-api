version: '3.9'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ezra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_DB: ${DB_NAME:-ezradb}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrate:/docker-entrypoint-initdb.d
    networks:
      - ezra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ezradb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Redis Cache (Optional)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ezra-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ezra-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    profiles:
      - full # Only start with --profile full

  # ==========================================
  # API Application
  # ==========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VERSION: ${APP_VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME}
        GIT_COMMIT: ${GIT_COMMIT}
    container_name: ezra-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:8090"
    environment:
      # App Configuration
      APP_NAME: ${APP_NAME:-Ezra API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8090
      APP_DEBUG: ${APP_DEBUG:-false}
      
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-ezradb}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      
      # Redis Configuration (Optional)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:?JWT secret key required}
      JWT_TOKEN_EXPIRY: ${JWT_TOKEN_EXPIRY:-10}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-168h}
      
      # OAuth Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      
      # Firebase Configuration
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-false}
      
      # Email Configuration
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-starttls}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      
      # PayWay Configuration
      PAYWAY_MERCHANT_ID: ${PAYWAY_MERCHANT_ID:-}
      PAYWAY_API_KEY: ${PAYWAY_API_KEY:-}
      PAYWAY_BASE_URL: ${PAYWAY_BASE_URL:-https://api.payway.com.kh}
      PAYWAY_ENABLED: ${PAYWAY_ENABLED:-false}
      
      # Gin Framework
      GIN_MODE: ${GIN_MODE:-release}
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - firebase_credentials:/app/firebase:ro
    networks:
      - ezra-network
    depends_on:
      postgres:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8090/ping"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

  # ==========================================
  # Nginx Reverse Proxy (Optional)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ezra-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - ezra-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - nginx # Only start with --profile nginx

# ==========================================
# Networks
# ==========================================
networks:
  ezra-network:
    name: ezra-network
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    name: ezra-postgres-data
    driver: local
  
  redis_data:
    name: ezra-redis-data
    driver: local
  
  nginx_logs:
    name: ezra-nginx-logs
    driver: local
  
  firebase_credentials:
    name: ezra-firebase-credentials
    driver: local