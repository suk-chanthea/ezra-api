version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gin-api-dev
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
    ports:
      - "8090:8090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: ezradb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8090
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: ezra-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ezradb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrate:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: ezre-redis-dev
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25
    container_name: nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  go_cache:
