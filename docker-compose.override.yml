version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gin-api-dev
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
    ports:
      - "8090:8090"
    environment:
      TZ: Asia/Phnom_Penh
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: ezradb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8090
      POSTGRES_URL: postgres://postgres:secret@postgres:5432/ezradb?sslmode=disable
      SECRET: paracletus
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "api-sandbox.payway.com.kh:10.0.0.1"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: ezra-postgres-dev
    environment:
      TZ: Asia/Phnom_Penh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ezradb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrate:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: ezra-redis-dev
    environment:
      TZ: Asia/Phnom_Penh
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25
    container_name: nginx_dev
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  postgres_data:
  go_cache:
